<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalSight — Login</title>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="../static/login.css">
</head>
<body>
    <div class="crosses-bg" aria-hidden="true">
        <div class="cross" style="--x:8%;  --delay:0s;   --dur:14s; --size:1.4rem; --op:0.13;"></div>
        <div class="cross" style="--x:18%; --delay:2s;   --dur:18s; --size:2rem;   --op:0.09;"></div>
        <div class="cross" style="--x:30%; --delay:5s;   --dur:12s; --size:1rem;   --op:0.17;"></div>
        <div class="cross" style="--x:42%; --delay:1s;   --dur:20s; --size:2.4rem; --op:0.07;"></div>
        <div class="cross" style="--x:55%; --delay:7s;   --dur:15s; --size:1.2rem; --op:0.14;"></div>
        <div class="cross" style="--x:65%; --delay:3s;   --dur:17s; --size:1.8rem; --op:0.10;"></div>
        <div class="cross" style="--x:75%; --delay:9s;   --dur:13s; --size:0.9rem; --op:0.18;"></div>
        <div class="cross" style="--x:85%; --delay:4s;   --dur:22s; --size:2.8rem; --op:0.06;"></div>
        <div class="cross" style="--x:92%; --delay:6s;   --dur:16s; --size:1.5rem; --op:0.12;"></div>
        <div class="cross" style="--x:3%;  --delay:11s;  --dur:19s; --size:2.2rem; --op:0.08;"></div>
        <div class="cross" style="--x:48%; --delay:8s;   --dur:11s; --size:1.1rem; --op:0.15;"></div>
        <div class="cross" style="--x:22%; --delay:13s;  --dur:24s; --size:3rem;   --op:0.05;"></div>
        <div class="cross" style="--x:70%; --delay:0.5s; --dur:13s; --size:1.3rem; --op:0.13;"></div>
        <div class="cross" style="--x:37%; --delay:15s;  --dur:18s; --size:1.7rem; --op:0.10;"></div>
        <div class="cross" style="--x:58%; --delay:10s;  --dur:21s; --size:0.8rem; --op:0.20;"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-cross" aria-hidden="true"></div>
                <h1>VitalSight</h1>
                <p id="header-sub">Sign in to monitor your loved ones</p>
            </div>
            <div class="tab-switcher">
                <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
            </div>
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
            </div>
            <div class="input-group register-only" id="confirm-group" style="display:none;">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Repeat your password" />
            </div>

            <div class="error-msg" id="error-msg"></div>
            <div class="success-msg" id="success-msg"></div>

            <button class="login-btn" id="login-btn" onclick="handleSubmit()">
                <span id="btn-text">Sign In</span>
                <span id="btn-spinner" class="spinner" style="display:none;"></span>
            </button>

            <p class="switch-hint" id="switch-hint">
                Don't have an account?
                <a href="#" onclick="switchTab('register'); return false;">Register here</a>
            </p>
        </div>
    </div>

    <script>
        let currentTab = 'login';

        function switchTab(tab) {
            currentTab = tab;
            const isLogin = tab === 'login';
            document.getElementById('tab-login').classList.toggle('active', isLogin);
            document.getElementById('tab-register').classList.toggle('active', !isLogin);
            document.getElementById('confirm-group').style.display = isLogin ? 'none' : 'flex';
            document.getElementById('header-sub').textContent = isLogin
                ? 'Sign in to monitor your loved ones'
                : 'Create your VitalSight account';
            document.getElementById('btn-text').textContent = isLogin ? 'Sign In' : 'Create Account';
            document.getElementById('switch-hint').innerHTML = isLogin
                ? 'Don\'t have an account? <a href="#" onclick="switchTab(\'register\'); return false;">Register here</a>'
                : 'Already have an account? <a href="#" onclick="switchTab(\'login\'); return false;">Sign in</a>';

            // Clear messages
            document.getElementById('error-msg').textContent = '';
            document.getElementById('success-msg').textContent = '';
        }

        async function handleSubmit() {
            if (currentTab === 'login') {
                await handleLogin();
            } else {
                await handleRegister();
            }
        }

        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            errorMsg.textContent = '';
            if (!username || !password) { errorMsg.textContent = 'Please fill in all fields.'; return; }

            setLoading(true);
            try {
                const response = await fetch('http://localhost:5000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    window.location.href = 'index.html';
                } else {
                    errorMsg.textContent = data.message || 'Invalid credentials.';
                }
            } catch {
                errorMsg.textContent = 'Cannot reach server. Is it running?';
            } finally {
                setLoading(false);
            }
        }

        async function handleRegister() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');

            errorMsg.textContent = '';
            successMsg.textContent = '';

            if (!username || !password || !confirm) { errorMsg.textContent = 'Please fill in all fields.'; return; }
            if (password !== confirm) { errorMsg.textContent = 'Passwords do not match.'; return; }
            if (password.length < 6) { errorMsg.textContent = 'Password must be at least 6 characters.'; return; }

            setLoading(true);
            try {
                const response = await fetch('http://localhost:5000/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok) {
                    successMsg.textContent = 'Account created! You can now sign in.';
                    setTimeout(() => switchTab('login'), 1500);
                } else {
                    errorMsg.textContent = data.message || 'Registration failed.';
                }
            } catch {
                errorMsg.textContent = 'Cannot reach server. Is it running?';
            } finally {
                setLoading(false);
            }
        }

        function setLoading(on) {
            const btn = document.getElementById('login-btn');
            document.getElementById('btn-text').style.display = on ? 'none' : 'inline';
            document.getElementById('btn-spinner').style.display = on ? 'inline-block' : 'none';
            btn.disabled = on;
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSubmit();
        });
    </script>
</body>
</html>
