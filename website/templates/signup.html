<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalSight — Sign Up</title>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="../static/login.css">
</head>
<body>
    <div class="crosses-bg" aria-hidden="true">
        <div class="cross" style="--x:8%;  --delay:0s;   --dur:14s; --size:1.4rem; --op:0.13;"></div>
        <div class="cross" style="--x:18%; --delay:2s;   --dur:18s; --size:2rem;   --op:0.09;"></div>
        <div class="cross" style="--x:30%; --delay:5s;   --dur:12s; --size:1rem;   --op:0.17;"></div>
        <div class="cross" style="--x:42%; --delay:1s;   --dur:20s; --size:2.4rem; --op:0.07;"></div>
        <div class="cross" style="--x:55%; --delay:7s;   --dur:15s; --size:1.2rem; --op:0.14;"></div>
        <div class="cross" style="--x:65%; --delay:3s;   --dur:17s; --size:1.8rem; --op:0.10;"></div>
        <div class="cross" style="--x:75%; --delay:9s;   --dur:13s; --size:0.9rem; --op:0.18;"></div>
        <div class="cross" style="--x:85%; --delay:4s;   --dur:22s; --size:2.8rem; --op:0.06;"></div>
        <div class="cross" style="--x:92%; --delay:6s;   --dur:16s; --size:1.5rem; --op:0.12;"></div>
        <div class="cross" style="--x:3%;  --delay:11s;  --dur:19s; --size:2.2rem; --op:0.08;"></div>
        <div class="cross" style="--x:48%; --delay:8s;   --dur:11s; --size:1.1rem; --op:0.15;"></div>
        <div class="cross" style="--x:22%; --delay:13s;  --dur:24s; --size:3rem;   --op:0.05;"></div>
        <div class="cross" style="--x:70%; --delay:0.5s; --dur:13s; --size:1.3rem; --op:0.13;"></div>
        <div class="cross" style="--x:37%; --delay:15s;  --dur:18s; --size:1.7rem; --op:0.10;"></div>
        <div class="cross" style="--x:58%; --delay:10s;  --dur:21s; --size:0.8rem; --op:0.20;"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-cross" aria-hidden="true"></div>
                <h1>VitalSight</h1>
                <p>Create your account</p>
            </div>

            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Choose a username" autocomplete="username" />
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Choose a password" autocomplete="new-password" />
            </div>

            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Repeat your password" autocomplete="new-password" />
            </div>

            <div class="input-group">
                <label for="device-id">Device ID</label>
                <input type="text" id="device-id" placeholder="Choose an Identification Number" autocomplete="username" />
            </div>

            <div class="error-msg" id="error-msg"></div>
            <div class="success-msg" id="success-msg"></div>

            <button class="login-btn" id="signup-btn" onclick="handleRegister()">
                <span id="btn-text">Create Account</span>
                <span id="btn-spinner" class="spinner" style="display:none;"></span>
            </button>

            <div class="switch-hint">
                <span>Already have an account?</span>
                <a href="/login" class="switch-link">Sign in</a>
            </div>
        </div>
    </div>

    <script>
    async function handleRegister() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('confirm-password').value;
        const deviceId = document.getElementById('device-id').value.trim();
        const errorMsg   = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');

        errorMsg.textContent   = '';
        successMsg.textContent = '';

        if (!username || !password || !confirm || !deviceId) {
            errorMsg.textContent = 'Please fill in all fields.'; return;
        }
        if (password !== confirm) {
            errorMsg.textContent = 'Passwords do not match.'; return;
        }
        if (password.length < 6) {
            errorMsg.textContent = 'Password must be at least 6 characters.'; return;
        }

        setLoading(true);
        try {
            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, device_id: deviceId })
            });
            const data = await response.json();
            if (response.ok) {
                successMsg.textContent = 'Account created! Redirecting to login…';
                setTimeout(() => window.location.href = '/login', 1500);
            } else {
                errorMsg.textContent = data.message || 'Registration failed.';
            }
        } catch {
            errorMsg.textContent = 'Cannot reach server. Is it running?';
        } finally {
            setLoading(false);
        }
    }

    function setLoading(on) {
        const btn = document.getElementById('signup-btn');
        document.getElementById('btn-text').style.display    = on ? 'none'         : 'inline';
        document.getElementById('btn-spinner').style.display = on ? 'inline-block' : 'none';
        btn.disabled = on;
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleRegister();
    });
</script>
</body>
</html>
